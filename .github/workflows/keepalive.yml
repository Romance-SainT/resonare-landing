name: keep-signaling-awake
# Render 무료 신호서버가 15분 미사용으로 잠들지 않게 주기적으로 /health 핑.
# GitHub 서버에서 실행됨(사용자 PC 불필요). 공개 repo라 Actions 무료 무제한.
on:
  schedule:
    - cron: "*/10 * * * *"   # 약 10분마다 (GitHub 크론은 다소 지연될 수 있음)
  workflow_dispatch:          # 수동 실행 버튼
permissions:
  contents: read
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping signaling /health
        run: |
          URL="https://resonare-signaling.onrender.com/health"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then echo "awake"; exit 0; fi
            sleep 25
          done
          echo "not up yet (ok — will retry next run)"